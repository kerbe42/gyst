<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: rounded square in the app's dark gray base. -->
  <rect width="512" height="512" rx="96" ry="96" fill="#111113"/>

  <!-- Soft accent radial top-left for depth, matches the sidebar treatment. -->
  <defs>
    <radialGradient id="glow" cx="0.25" cy="0.2" r="0.7">
      <stop offset="0%"  stop-color="#3b3bf5" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#3b3bf5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b3bf5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dotgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6e6efb"/>
      <stop offset="100%" stop-color="#3b3bf5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#glow)"/>

  <!-- Wordmark: GYST. Heavy weight, tight tracking, white. -->
  <g font-family="Space Grotesk, Inter, system-ui, sans-serif"
     font-weight="800"
     font-size="240"
     fill="#f4f4f6"
     text-anchor="middle">
    <text x="256" y="320" letter-spacing="-12">GYST</text>
  </g>

  <!-- Accent dot — same designed move as the sidebar brand. -->
  <circle cx="424" cy="330" r="22" fill="url(#dotgrad)"/>
</svg>
